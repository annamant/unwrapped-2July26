<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unwrapped</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --vermillion: rgb(232, 52, 28);
        --black: #020202;
        --white: #FCFCFC;
        --grey: #ABABAB;
        --light: #F4F4F4;
        --border: #E2E2E2;
      }
      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--white);
        color: var(--black);
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      #root { min-height: 100vh; }
      img, svg, video, canvas { max-width: 100%; height: auto; }
      /* Prevent iOS Safari auto-zoom on input focus: fields must be >= 16px on small screens */
      @media (max-width: 640px) {
        input, select, textarea { font-size: 16px !important; }
        button, a { -webkit-tap-highlight-color: transparent; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
